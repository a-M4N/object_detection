# Detection Configuration
detection:
  model: "yolov8n-ppe.pt"  # Pre-trained PPE model
  confidence_threshold: 0.1  # Lowered to detect all types of PPEs more aggressively
  iou_threshold: 0.7  # Increased to prevent overlapping PPEs from being suppressed
  device: "cuda"  # cuda or cpu
  imgsz: 1280  # Increased to 1280 for better detection of small PPE like goggles

# Tracking Configuration
tracking:
  enabled: false
  tracker_type: "bytetrack"
  track_thresh: 0.5
  track_buffer: 30
  match_thresh: 0.8
  min_box_area: 10

# Speed Estimation
speed_estimation:
  enabled: false

# Height Estimation
height_estimation:
  enabled: false

# Distance Estimation
distance_estimation:
  enabled: false

# Direction Detection
direction_detection:
  enabled: false

# PPE Detection (secondary inference)
ppe_detection:
  enabled: false

# Visualization
visualization:
  show_bbox: true
  show_label: true
  show_confidence: true
  show_track_id: true
  show_speed: true
  show_height: true
  show_distance: true
  show_direction: true
  show_fps: true
  bbox_thickness: 2
  font_scale: 0.6
  font_thickness: 2
  colors:  # BGR format
    helmet: [0, 255, 255]      # Yellow
    Safety Helmet: [0, 255, 255]
    Vest: [0, 165, 255]        # Orange
    Safety Vest: [0, 165, 255]
    Gloves: [255, 0, 0]        # Blue
    goggles: [255, 0, 255]     # Magenta
    mask: [0, 255, 0]          # Green
    safety_shoe: [128, 128, 0] # Teal
    default: [255, 255, 255]

# Output Configuration
output:
  save_video: true
  save_data: true
  output_dir: "output"
  video_codec: "mp4v"  # mp4v, avc1, or h264
  video_fps: 30
  data_format: "both"  # csv, json, or both

# Alert System
alerts:
  enabled: true
  speed_limit_kmh: 60
  alert_classes: ["car", "truck", "bus"]
  intrusion_zones: []  # List of polygon coordinates
  log_alerts: true

# Performance
performance:
  skip_frames: 0  # Process every Nth frame (0 = process all)
  resize_input: false
  resize_width: 640
  resize_height: 480
  use_half_precision: true  # FP16 for faster inference on GPU

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_to_file: true
  log_file: "output/logs/app.log"
